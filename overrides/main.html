{% extends "base.html" %}

{% block content %}
  {{ super() }}

  <!-- Giscus 评论区 —— GitHub 登录，零配置，无需数据库 -->
  <hr style="margin-top: 3rem;">
  <h2 id="__comments">💬 评论区</h2>
  <p style="color: var(--md-default-fg-color--light);">
    使用 GitHub 账号登录即可评论、回复与点赞 👍
  </p>
  <script src="https://giscus.app/client.js"
    data-repo="MegumiKaor1/Blog"
    data-repo-id="R_kgDOSP2XVA"
    data-category="Announcements"
    data-category-id="DIC_kwDOSP2XVM4C79sB"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="preferred_color_scheme"
    data-lang="zh-CN"
    crossorigin="anonymous"
    async>
  </script>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <!-- 自动为外部链接添加 target="_blank" -->
  <script>
    (function() {
      function fixExternalLinks() {
        document.querySelectorAll('a[href^="http"]').forEach(function(link) {
          // 跳过博客内部链接（当前域名）
          if (link.hostname === 'megumikaor1.github.io') return;
          // 跳过已经是 _blank 的链接
          if (link.getAttribute('target') === '_blank') return;
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener');
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', fixExternalLinks);
      } else {
        fixExternalLinks();
      }
    })();
  </script>
{% endblock %}
